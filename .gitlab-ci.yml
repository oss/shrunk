stages:
  - build
  - package
  - test
  - lint

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - frontend/.npm/
    - .cache/pip

eslint:
  stage: lint
  image: node:latest
  needs: []
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npx eslint --format=junit src > ../eslint.xml
  artifacts:
    reports:
      junit: eslint.xml

pylint:
  stage: lint
  image: python:latest
  needs: []
  script:
    - apt-get update
    - apt-get install -y gcc libldap-common libldap2-dev libsasl2-dev
    - cd backend
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - uv sync
    - uv run pylint --exit-zero --output-format=junit shrunk tests/*.py > pylint.xml
  artifacts:
    reports:
      junit: backend/pylint.xml

mypy:
  # stage: lint
  when: manual
  image: python:latest
  needs: []
  script:
    - cd backend
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - uv sync
    - uv run mypy --junit-xml=./mypy.xml .
  artifacts:
    reports:
      junit: mypy.xml

flake8:
  stage: lint
  image: python:3.14
  needs: []
  script:
    - cd backend
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - uv sync
    - uv run flake8 --format=pylint --exit-zero --format=junit-xml shrunk tests > flake8.xml
  artifacts:
    reports:
      junit: backend/flake8.xml

black:
  stage: lint
  image: python:latest
  needs: []
  script:
    - cd backend
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - uv sync
    - uv run black --check .

prettier:
  stage: lint
  image: node:latest
  needs: []
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npx prettier --check .
  artifacts:
    reports:
      junit: eslint.xml

frontend:
  stage: build
  image: node:20
  needs: []
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist/*
    expire_in: '1 day'

backend:
  stage: build
  image: python:3.14
  needs: []
  script:
    - cd backend
    - apt-get update
    - apt-get install -y libsasl2-dev libldap2-dev libssl-dev
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - uv build
  artifacts:
    paths:
      - backend/dist/shrunk-*.whl
    expire_in: '1 day'

package:
  stage: package
  image: alpine:latest
  needs:
    - job: frontend
    - job: backend
  script:
    - mkdir -p shrunk
    - mkdir -p shrunk/frontend
    - mkdir -p shrunk/backend
    - cp -r frontend/dist/* shrunk/frontend
    - cp -r backend/dist/* shrunk/backend
  artifacts:
    paths:
      - shrunk/
    expose_as: 'shrunk'

backend-test:
  stage: test
  image: python:3.14
  needs: [backend]
  dependencies:
    - backend
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip_centos"
    CRYPTOGRAPHY_DONT_BUILD_RUST: 1
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip_centos
  services:
    - mongo
  script:
    - apt-get update
    - apt-get install -y libldap2-dev libsasl2-dev
    
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - pip install backend/dist/shrunk-*.whl

    - mkdir /usr/share/GeoIP
    - cp backend/GeoLite2-City.mmdb /usr/share/GeoIP/GeoLite2-City.mmdb

    - curl -fsS https://dotenvx.sh | sh
    - cp .env.example test.env

    - dotenvx set SHRUNK_DB_HOST mongo -f test.env
    - dotenvx set SHRUNK_DB_NAME shrunk_test -f test.env
    - dotenvx set SHRUNK_FLASK_TESTING 1 -f test.env
    - dotenvx set SHRUNK_GOOGLE_SAFEBROWSE_ENABLED 1 -f test.env
    - dotenvx set SHRUNK_GOOGLE_SAFEBROWSE_API_KEY "$GOOGLE_SAFE_BROWSING_API" -f test.env

    - cd backend
    - uv sync
    - dotenvx run -f ../test.env -- uv run pytest --junitxml=../pytest.xml tests
  artifacts:
    reports:
      junit: pytest.xml
