services:
  backend-test:
    build: ./backend
    command: uv run pytest tests
    volumes:
      - ./test.env:/usr/shrunk/backend/.env
      - ./backend:/usr/shrunk/backend
      - backend_venv:/usr/shrunk/backend/.venv
    working_dir: /usr/shrunk/backend
    env_file:
      - ./test.env
    depends_on:
      - mongodb-test

  mongodb-test:
    hostname: mongodb-test
    container_name: shrunk-mongo-test
    image: mongo:latest
    attach: false  # We don't care.
    command: mongod --port 27018
    ports:
        - '27018:27018'

volumes:
  backend_venv:
